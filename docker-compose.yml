services:
  app-dev:
    build:
      context: .
      target: dev
    container_name: ai-frameworks-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules

  app-static:
    build:
      context: .
      target: static
      args:
        NEXT_OUTPUT_EXPORT: "true"
    container_name: ai-frameworks-static
    ports:
      - "8080:80"
